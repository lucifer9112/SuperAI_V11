# ================================================================
# SuperAI V9 — docker/docker-compose.yml
# Services: backend · frontend · redis · prometheus · grafana · nginx
#
# Start:      docker compose up -d
# With GPU:   docker compose --profile gpu up -d
# Logs:       docker compose logs -f backend
# Stop:       docker compose down
# ================================================================

version: "3.9"

x-env: &env
  REDIS_URL:       redis://redis:6379/0
  LOGGING__LEVEL:  INFO
  LOGGING__FORMAT: json
  SERVER__PORT:    "8000"

x-restart: &restart
  restart: unless-stopped

services:

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: superai_v9_backend
    <<: *restart
    ports:   ["8000:8000"]
    volumes:
      - v9_data:/app/data
      - v9_logs:/app/logs
      - hf_cache:/root/.cache/huggingface
    environment:
      <<: *env
      MODELS__DEVICE: ${MODELS__DEVICE:-auto}
      SECRET_KEY:     ${SECRET_KEY:-change-in-production}
      HF_TOKEN:       ${HF_TOKEN:-}
    env_file: ["../.env"]
    depends_on:
      redis: { condition: service_healthy }
    healthcheck:
      test:         ["CMD","curl","-f","http://localhost:8000/health"]
      interval:     30s
      timeout:      10s
      start_period: 30s
      retries:      3
    networks: [superai_net]

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: superai_v9_frontend
    <<: *restart
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_WS_URL:  ws://backend:8000
    depends_on:
      backend: { condition: service_healthy }
    networks: [superai_net]

  redis:
    image: redis:7-alpine
    container_name: superai_v9_redis
    <<: *restart
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    command: >
      redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s; timeout: 5s; retries: 5
    networks: [superai_net]

  prometheus:
    image: prom/prometheus:latest
    container_name: superai_v9_prometheus
    <<: *restart
    ports:   ["9090:9090"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [superai_net]

  grafana:
    image: grafana/grafana:latest
    container_name: superai_v9_grafana
    <<: *restart
    ports: ["3001:3000"]
    volumes: [grafana_data:/var/lib/grafana]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-superai_admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    depends_on: [prometheus]
    networks: [superai_net]

  nginx:
    image: nginx:alpine
    container_name: superai_v9_nginx
    <<: *restart
    ports: ["80:80"]
    volumes: [./nginx.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: [backend, frontend]
    networks: [superai_net]

volumes:
  v9_data:; v9_logs:; redis_data:; prometheus_data:; grafana_data:; hf_cache:

networks:
  superai_net: { driver: bridge }
