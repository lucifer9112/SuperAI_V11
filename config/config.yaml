mode: "minimal"

app:
  name: "SuperAI"
  version: "11.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1
  environment: "development"
  cors_origins:
    - "*"

models:
  device: "auto"
  cache_size: 1
  idle_timeout: 300
  default_max_tokens: 512
  default_temperature: 0.7
  primary: "Qwen/Qwen2.5-0.5B-Instruct"

logging:
  level: "INFO"
  format: "text"
  file: "logs/superai.log"
  rotation: "10 MB"

memory:
  enabled: true
  backend: "sqlite"
  db_path: "data/superai.db"
  context_window: 5
  max_history_turns: 20

security:
  enabled: true
  require_auth: false
  prompt_injection_guard: true
  output_filter: true

personality:
  enabled: false
  name: "SuperAI"
  version: "11.0"
  system_prompt: "You are SuperAI, a helpful and accurate AI assistant. Give clear, concise answers."

features:
  enable_workflow: false
  enable_skills: false
  enable_context: false
  enable_judge: false
  enable_cognitive: false
  enable_reflection: false
  enable_learning: false
  enable_advanced_memory: false
  enable_parallel_agents: false
  enable_rag: false
  enable_self_improvement: false
  enable_model_registry: false
  enable_ai_security: false
  enable_multimodal: false
  enable_distributed: false
  enable_personality: false
  enable_rlhf: false
  enable_tools: false
  enable_consensus: false
  enable_code_review: false
  enable_debugging: false
  enable_voice: false
  enable_vision: false
  enable_feedback: false
  enable_agent: false
