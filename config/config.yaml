mode: "advanced"

app:
  name: "SuperAI"
  version: "11.0"
  environment: "development"

server:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1
  environment: "development"
  cors_origins:
    - "*"

models:
  device: "auto"
  cache_size: 1
  idle_timeout: 300
  load_timeout_s: 180
  default_max_tokens: 512
  default_temperature: 0.7
  primary: "Qwen/Qwen2.5-0.5B-Instruct"
  fallback_models:
    - "sshleifer/tiny-gpt2"
  consensus_models:
    - "Qwen/Qwen2.5-0.5B-Instruct"
    - "sshleifer/tiny-gpt2"

logging:
  level: "INFO"
  format: "text"
  file: "logs/superai.log"
  rotation: "10 MB"

memory:
  enabled: true
  backend: "sqlite"
  db_path: "data/superai.db"
  context_window: 5
  max_history_turns: 20

feedback:
  enabled: true
  store_path: "data/feedback.db"
  min_score: 1
  max_score: 5
  learning_threshold: 50

security:
  enabled: true
  require_auth: false
  bandit_scan: true
  prompt_injection_guard: true
  output_filter: true

personality:
  enabled: true
  name: "SuperAI"
  version: "11.0"
  system_prompt: "You are SuperAI, a helpful and accurate AI assistant. Give clear, concise answers."

voice:
  enabled: true
  stt_model: "base"
  tts_engine: "gtts"
  language: "en"
  tts_rate: 180
  tts_volume: 1.0

skills:
  builtin_dir: "backend/skills/builtin/"
  custom_dir: "data/custom_skills"
  auto_activate_all: true

features:
  enable_workflow: true
  enable_skills: true
  enable_context: true
  enable_judge: true
  enable_cognitive: true
  enable_reflection: true
  enable_learning: true
  enable_advanced_memory: true
  enable_parallel_agents: true
  enable_rag: true
  enable_self_improvement: true
  enable_model_registry: true
  enable_ai_security: true
  enable_multimodal: true
  enable_distributed: true
  enable_personality: true
  enable_rlhf: true
  enable_tools: true
  enable_consensus: true
  enable_code_review: true
  enable_debugging: true
  enable_voice: true
  enable_vision: true
  enable_feedback: true
  enable_agent: true
